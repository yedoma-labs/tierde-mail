services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: tierde-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — catch-all, no auth required
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_MAX_MESSAGES: "500"

  wiremock:
    image: wiremock/wiremock:latest
    container_name: tierde-wiremock
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP mock — Resend, SendGrid, Postmark
    volumes:
      - ./scripts/wiremock/mappings:/home/wiremock/mappings

  localstack:
    image: localstack/localstack:latest
    container_name: tierde-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"   # AWS API gateway
    environment:
      SERVICES: ses
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
      SES_EMAIL_BODY_VALIDATION_ENABLED: "0"   # skip validation — local/CI only
      SES_REGION: ${SES_REGION:-us-east-1}
      TIERDE_FROM_EMAIL: ${TIERDE_FROM_EMAIL:-dev@example.com}
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: ${SES_REGION:-us-east-1}
    volumes:
      - ./scripts/localstack/init-ses.sh:/etc/localstack/init/ready.d/init-ses.sh
    depends_on:
      - mailpit
