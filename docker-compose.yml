services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: tierde-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP — catch-all, no auth required
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_MAX_MESSAGES: "500"

  localstack:
    image: localstack/localstack:latest
    container_name: tierde-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"   # AWS API gateway
    environment:
      SERVICES: ses
      DEFAULT_REGION: us-east-1
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
